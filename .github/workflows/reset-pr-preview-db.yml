name: PREVIEW PR - Reset Database

env:
  HUSKY: 0

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to reset database for'
        required: true
        type: string

concurrency:
  group: pr-preview-${{ inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reset-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Uncloud CLI
        run: |
          curl -fsS https://get.uncloud.run/install.sh | sh
          uc --version

      - name: Setup SSH
        shell: bash
        env:
          UNCLOUD_HOST: ${{ secrets.UNCLOUD_HOST }}
          UNCLOUD_USER: ${{ secrets.UNCLOUD_USER }}
          UNCLOUD_PORT: ${{ secrets.UNCLOUD_PORT }}
          UNCLOUD_SSH_KEY: ${{ secrets.UNCLOUD_SSH_KEY }}
        run: |
          set -euo pipefail

          for required in UNCLOUD_HOST UNCLOUD_USER UNCLOUD_PORT UNCLOUD_SSH_KEY; do
            if [ -z "${!required:-}" ]; then
              echo "Missing required secret: ${required}"
              exit 1
            fi
          done

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.UNCLOUD_SSH_KEY }}" > ~/.ssh/id_ecdsa
          chmod 600 ~/.ssh/id_ecdsa

      - name: Configure SSH multiplexing
        shell: bash
        env:
          UNCLOUD_HOST: ${{ secrets.UNCLOUD_HOST }}
          UNCLOUD_USER: ${{ secrets.UNCLOUD_USER }}
          UNCLOUD_PORT: ${{ secrets.UNCLOUD_PORT }}
        run: |
          set -euo pipefail

          cat > ~/.ssh/config <<EOF
          Host uncloud-host
            HostName ${UNCLOUD_HOST}
            User ${UNCLOUD_USER}
            Port ${UNCLOUD_PORT}
            IdentityFile ~/.ssh/id_ecdsa
            StrictHostKeyChecking no
            ControlMaster auto
            ControlPersist 10m
            ControlPath ~/.ssh/control-%r@%h:%p
          EOF
          chmod 600 ~/.ssh/config

          echo "::add-mask::$UNCLOUD_HOST"
          echo "::add-mask::$UNCLOUD_USER"
          echo "::add-mask::$UNCLOUD_PORT"

          ssh -o BatchMode=yes uncloud-host true

          uc ls --connect "ssh+cli://uncloud-host" > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "Failed to connect to server"
            exit 1
          fi

      - name: Check if PR preview exists
        env:
          PR_ID: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          echo "Checking if preview for PR ${PR_ID} exists..."

          if ! uc --connect "ssh+cli://uncloud-host" service inspect db-preview-pr-${PR_ID} > /dev/null 2>&1; then
            echo "ERROR: Database container db-preview-pr-${PR_ID} does not exist"
            exit 1
          fi

          if ! uc --connect "ssh+cli://uncloud-host" service inspect api-preview-pr-${PR_ID} > /dev/null 2>&1; then
            echo "ERROR: API container api-preview-pr-${PR_ID} does not exist"
            exit 1
          fi

          echo "Preview for PR ${PR_ID} exists - proceeding with database reset"

      - name: Drop and recreate database schema
        env:
          PR_ID: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          echo "Dropping drizzle metadata and recreating database schema for PR ${PR_ID}..."

          uc --connect "ssh+cli://uncloud-host" exec db-preview-pr-${PR_ID} psql -v ON_ERROR_STOP=1 -U postgres -d postgres \
            -c "REVOKE CONNECT ON DATABASE guidebook FROM public;" \
            -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'guidebook' AND pid <> pg_backend_pid();" \
            -c "DROP DATABASE IF EXISTS guidebook;" \
            -c "CREATE DATABASE guidebook;" \
            -c "GRANT ALL PRIVILEGES ON DATABASE guidebook TO postgres;" \
            -c "GRANT CONNECT ON DATABASE guidebook TO public;"

      - name: Seed database
        continue-on-error: true
        env:
          PR_ID: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            if uc --connect "ssh+cli://uncloud-host" exec api-preview-pr-${PR_ID} npm i -g tsx drizzle-kit drizzle-orm && \
              uc --connect "ssh+cli://uncloud-host" exec api-preview-pr-${PR_ID} npm run db:seed; then
              exit 0
            fi

            echo "Seed attempt ${attempt} failed; retrying..."
            sleep 10
          done

          echo "Seed step skipped after repeated failures"
          exit 0
