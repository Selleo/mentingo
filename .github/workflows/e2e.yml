name: E2E Tests

env:
  HUSKY: 0
  JWT_SECRET: "test_secret"
  JWT_REFRESH_SECRET: "test_refresh"
  JWT_EXPIRATION_TIME: "15min"
  CORS_ORIGIN: "http://localhost:5173"
  EMAIL_ADAPTER: "mailhog"
  DATABASE_URL: "postgresql://test_user:test_password@localhost:54321/test_db"
  REDIS_URL: "redis://localhost:6380"
  SMTP_HOST: "localhost"
  SMTP_PORT: "1025"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  AWS_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin"
  AWS_BUCKET_NAME: "test-bucket"
  AWS_ENDPOINT_URL: "http://localhost:9100"
  SMTP_EMAIL_FROM: "noreply@lms.selleo.app"

on:
  workflow_call:
    inputs:
      browser:
        description: Playwright project to run
        required: false
        type: string
        default: all
    secrets:
        STRIPE_SECRET_KEY:
          required: true
        STRIPE_PUBLISHABLE_KEY:
          required: true
        STRIPE_WEBHOOK_SECRET:
          required: true
        MASTER_KEY:
          required: true
        OPENAI_API_KEY:
          required: true
  push:
    branches:
      - main
      - staging

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    environment:
      name: e2e
    env:
      E2E_BROWSER: ${{ github.event_name == 'push' && github.ref_name == 'staging' && 'chromium' || (github.event_name == 'push' && 'all' || (inputs.browser || 'all')) }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 54321:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd "nc -z localhost 1025"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Caddy
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt update
          sudo apt install caddy -y

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.15.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm -w packages:build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright
          restore-keys: |
            ${{ runner.os }}-playwright

      - name: Install Playwright browsers
        shell: bash
        run: |
          case "$E2E_BROWSER" in
            chromium)
              pnpm exec playwright install --with-deps chromium
              ;;
            firefox)
              pnpm exec playwright install --with-deps firefox
              ;;
            all)
              pnpm exec playwright install --with-deps chromium firefox
              ;;
            *)
              echo "Unsupported E2E_BROWSER value: $E2E_BROWSER" >&2
              exit 1
              ;;
          esac
        working-directory: ./apps/web
        env:
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9100:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 5 \
            quay.io/minio/minio:latest server /data --console-address ":9001"

          health_status="starting"
          for i in {1..30}; do
            health_status="$(docker inspect --format='{{.State.Health.Status}}' minio)"
            if [ "$health_status" = "healthy" ]; then
              echo "MinIO is ready"
              break
            fi
            if [ "$health_status" = "unhealthy" ]; then
              echo "MinIO became unhealthy"
              docker logs minio || true
              exit 1
            fi
            sleep 2
          done

          if [ "$health_status" != "healthy" ]; then
            echo "MinIO failed to become healthy in time"
            docker logs minio || true
            exit 1
          fi

      - name: Setup MinIO bucket
        run: |
          docker run --rm \
            --network host \
            --entrypoint /bin/sh \
            -e S3_ENDPOINT="$AWS_ENDPOINT_URL" \
            -e S3_BUCKET_NAME="$AWS_BUCKET_NAME" \
            -e S3_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
            -e S3_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
            quay.io/minio/mc:latest \
            -ec '
              mc alias set local "$S3_ENDPOINT" "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY"
              mc mb --ignore-existing "local/$S3_BUCKET_NAME"
              echo "{\"CORSRules\":[{\"AllowedOrigins\":[\"*\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"POST\",\"DELETE\"],\"AllowedHeaders\":[\"*\"]}]}" > /tmp/cors.json
              mc cors set "local/$S3_BUCKET_NAME" /tmp/cors.json || true
            '

      - name: Run tests
        shell: bash
        run: |
          case "$E2E_BROWSER" in
            chromium)
              VITE_TEST=true pnpm playwright test --project chromium
              ;;
            firefox)
              VITE_TEST=true pnpm playwright test --project firefox
              ;;
            all)
              VITE_TEST=true pnpm playwright test
              ;;
            *)
              echo "Unsupported E2E_BROWSER value: $E2E_BROWSER" >&2
              exit 1
              ;;
          esac
        working-directory: ./apps/web
        env:
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
          DATABASE_URL: postgresql://test_user:test_password@localhost:54321/test_db
          REDIS_URL: "redis://localhost:6380"
          NODE_ENV: test
          API_URL: http://localhost:3000
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            **/*.zip
          retention-days: 3

      - name: Stop MinIO
        if: always()
        run: docker rm -f minio || true
